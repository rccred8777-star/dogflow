<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>C03-C — DogFlow Criativo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #canvas {
    width: min(100vw, calc(100vh * 9/16));
    height: min(100vh, calc(100vw * 16/9));
    background: #0a0a0a;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #text-display {
    width: 88%;
    text-align: center;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  .line {
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.1;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.4s ease, transform 0.4s ease;
    margin-bottom: 0.1em;
    display: block;
  }
  .line.show { opacity: 1; transform: scale(1); }
  .line.hero { font-size: clamp(64px, 14vw, 120px); color: #27ae60; }
  .line.big { font-size: clamp(38px, 7.5vw, 68px); }
  .line.med { font-size: clamp(26px, 5vw, 46px); }
  .line.small { font-size: clamp(18px, 3.5vw, 32px); color: #ccc; }
  .line.accent { color: #f5a623; }
  .line.green { color: #27ae60; }
  .line.cta { color: #f5a623; font-size: clamp(22px, 4.5vw, 42px); }
  .line.muted { color: #777; font-size: clamp(16px, 3vw, 28px); }

  #logo {
    position: absolute; bottom: 4%; width: 100%; text-align: center;
    font-family: Arial, sans-serif; font-size: clamp(14px,2.5vw,22px);
    color: #444; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.5s;
  }
  #progress {
    position: absolute; bottom: 0; left: 0; height: 4px;
    background: #27ae60; width: 0%;
  }
  #overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer; z-index: 10;
  }
  #overlay .play-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: #27ae60; display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin-bottom: 16px;
  }
  #overlay p { color: #fff; font-family: Arial, sans-serif; font-size: 16px; }
  #overlay small { color: #888; font-family: Arial, sans-serif; font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<div id="canvas">
  <div id="overlay" onclick="startAnimation()">
    <div class="play-icon">▶</div>
    <p>C03-C — "3 dias. Zero acidentes."</p>
    <small>Clique para iniciar · Grave a tela em 9:16 · ~33s</small>
  </div>
  <div id="text-display"></div>
  <div id="logo">🐾 DogFlow</div>
  <div id="progress"></div>
</div>

<script>
const TOTAL = 34000;

const SLIDES = [
  // HERO hook — número gigante
  { at: 0,     hold: 1800, text: '3 dias.', cls: 'hero' },
  { at: 1900,  hold: 2200, text: 'Zero acidentes.', cls: 'hero' },

  { at: 4500,  hold: 2500, text: 'Isso é o que a maioria dos donos', cls: 'small' },
  { at: 6200,  hold: 2500, text: 'relata com o DogFlow —', cls: 'med' },
  { at: 8000,  hold: 2500, text: 'protocolo de 7 dias', cls: 'med accent' },
  { at: 9500,  hold: 2500, text: 'que ensina o cão onde fazer.', cls: 'med' },

  { at: 12300, hold: 1600, text: 'Sem punição.', cls: 'med' },
  { at: 14000, hold: 1600, text: 'Sem produto milagroso.', cls: 'med' },
  { at: 15700, hold: 1800, text: 'Sem adestrador.', cls: 'med' },

  { at: 18000, hold: 2800, text: 'Funciona porque resolve', cls: 'small' },
  { at: 19200, hold: 2800, text: 'a causa real:', cls: 'small' },
  { at: 20400, hold: 3000, text: 'o cão nunca foi ENSINADO', cls: 'big' },
  { at: 21800, hold: 3000, text: 'onde fazer.', cls: 'big accent' },

  { at: 25200, hold: 2200, text: '👇 DogFlow', cls: 'cta' },
  { at: 26800, hold: 2000, text: 'R$27 · Acesso imediato', cls: 'green' },
  { at: 28800, hold: 2000, text: '7 dias · Lê a legenda ↓', cls: 'muted' },
];

function startAnimation() {
  document.getElementById('overlay').style.display = 'none';
  const display = document.getElementById('text-display');
  const logo = document.getElementById('logo');
  const progress = document.getElementById('progress');

  progress.style.transition = `width ${TOTAL}ms linear`;
  setTimeout(() => { progress.style.width = '100%'; }, 50);
  setTimeout(() => { logo.style.opacity = '1'; }, 25000);

  let currentEls = [];

  SLIDES.forEach(slide => {
    setTimeout(() => {
      currentEls.forEach(el => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 400);
      });
      currentEls = [];

      const el = document.createElement('span');
      el.className = 'line ' + slide.cls;
      el.textContent = slide.text;
      display.appendChild(el);
      currentEls.push(el);
      setTimeout(() => el.classList.add('show'), 30);

      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => { if (el.parentNode) el.remove(); }, 400);
      }, slide.hold);
    }, slide.at);
  });
}
</script>
</body>
</html>
