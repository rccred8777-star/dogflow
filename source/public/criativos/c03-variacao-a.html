<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C03-A — DogFlow Criativo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* 9:16 container */
  #canvas {
    width: min(100vw, calc(100vh * 9/16));
    height: min(100vh, calc(100vw * 16/9));
    background: #0d0d0d;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  #text-display {
    width: 85%;
    text-align: center;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  .line {
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.15;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    margin-bottom: 0.2em;
    display: block;
  }
  .line.show { opacity: 1; transform: translateY(0); }
  .line.big { font-size: clamp(42px, 8vw, 72px); }
  .line.med { font-size: clamp(28px, 5.5vw, 50px); }
  .line.small { font-size: clamp(20px, 3.8vw, 36px); }
  .line.accent { color: #f5a623; }
  .line.green { color: #27ae60; }
  .line.red { color: #e74c3c; }
  .line.muted { color: #aaa; font-size: clamp(18px, 3.2vw, 30px); font-weight: 700; }
  .line.cta { color: #f5a623; font-size: clamp(22px, 4.2vw, 40px); }

  /* Logo watermark */
  #logo {
    position: absolute; bottom: 4%; width: 100%; text-align: center;
    font-family: Arial, sans-serif; font-size: clamp(14px, 2.5vw, 22px);
    color: #555; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.5s;
  }

  /* Progress bar */
  #progress {
    position: absolute; bottom: 0; left: 0; height: 4px;
    background: #f5a623; width: 0%; transition: width linear;
  }

  /* Play button overlay */
  #overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer; z-index: 10;
  }
  #overlay .play-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: #f5a623; display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin-bottom: 16px;
  }
  #overlay p { color: #fff; font-family: Arial, sans-serif; font-size: 16px; }
  #overlay small { color: #888; font-family: Arial, sans-serif; font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<div id="canvas">
  <div id="overlay" onclick="startAnimation()">
    <div class="play-icon">▶</div>
    <p>C03-A — "Quantas vezes hoje"</p>
    <small>Clique para iniciar · Grave a tela em 9:16 · ~30s</small>
  </div>

  <div id="text-display"></div>
  <div id="logo">🐾 DogFlow</div>
  <div id="progress"></div>
</div>

<script>
const TOTAL_DURATION = 33000; // 33 segundos

const SLIDES = [
  // [delay_ms, duration_ms, text, class]
  { at: 0,    hold: 2800, text: 'Quantas vezes você limpou', cls: 'med' },
  { at: 700,  hold: 2800, text: 'xixi de cachorro hoje?', cls: 'big accent' },

  { at: 3200, hold: 1600, text: '1 vez?', cls: 'med' },
  { at: 4900, hold: 1600, text: '3 vezes?', cls: 'med' },
  { at: 6600, hold: 2000, text: 'Perdeu a conta?', cls: 'big red' },

  { at: 9000, hold: 2200, text: 'Não é teimosia.', cls: 'med' },
  { at: 11300,hold: 2200, text: 'Não é maldade.', cls: 'med' },
  { at: 13600,hold: 2800, text: 'Ninguém ensinou', cls: 'med' },
  { at: 14200,hold: 2800, text: 'onde é o lugar CERTO.', cls: 'big accent' },

  { at: 17500,hold: 2500, text: 'Existe um protocolo de 7 dias', cls: 'small' },
  { at: 19000,hold: 2500, text: 'que resolve isso.', cls: 'big green' },

  { at: 22000,hold: 1600, text: 'Sem gritar.', cls: 'med' },
  { at: 23700,hold: 1600, text: 'Sem punir.', cls: 'med' },
  { at: 25400,hold: 2000, text: 'Sem adestrador caro.', cls: 'med' },

  { at: 27800,hold: 2200, text: '+800 donos já fizeram.', cls: 'small muted' },
  { at: 29200,hold: 1800, text: 'Resultado no DIA 3.', cls: 'small muted' },

  { at: 31200,hold: 2000, text: '👇 DogFlow — R$27', cls: 'cta' },
  { at: 32000,hold: 2000, text: 'Acesso imediato · Lê a legenda', cls: 'muted' },
];

function startAnimation() {
  document.getElementById('overlay').style.display = 'none';
  const display = document.getElementById('text-display');
  const logo = document.getElementById('logo');
  const progress = document.getElementById('progress');

  // Progress bar
  progress.style.transition = `width ${TOTAL_DURATION}ms linear`;
  setTimeout(() => { progress.style.width = '100%'; }, 50);

  // Show logo at end
  setTimeout(() => { logo.style.opacity = '1'; }, 29000);

  // Clear display helper
  let currentEls = [];
  let clearTimer = null;

  SLIDES.forEach(slide => {
    setTimeout(() => {
      // Clear previous after short overlap
      currentEls.forEach(el => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 400);
      });
      currentEls = [];

      const el = document.createElement('span');
      el.className = 'line ' + slide.cls;
      el.textContent = slide.text;
      display.appendChild(el);
      currentEls.push(el);
      setTimeout(() => el.classList.add('show'), 30);

      // Schedule hide
      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => { if (el.parentNode) el.remove(); }, 400);
      }, slide.hold);

    }, slide.at);
  });
}
</script>
</body>
</html>
