<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>C03-B — DogFlow Criativo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #canvas {
    width: min(100vw, calc(100vh * 9/16));
    height: min(100vh, calc(100vw * 16/9));
    background: #ffffff;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #text-display {
    width: 85%;
    text-align: left;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  .line {
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-weight: 900;
    color: #0d0d0d;
    line-height: 1.2;
    opacity: 0;
    transform: translateX(-16px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    margin-bottom: 0.15em;
    display: block;
  }
  .line.show { opacity: 1; transform: translateX(0); }
  .line.big { font-size: clamp(38px, 7vw, 64px); }
  .line.med { font-size: clamp(26px, 5vw, 46px); }
  .line.small { font-size: clamp(20px, 3.8vw, 34px); }
  .line.accent { color: #f5a623; }
  .line.green-txt { color: #27ae60; }
  .line.red-txt { color: #e74c3c; }
  .line.muted { color: #666; font-size: clamp(18px, 3.2vw, 28px); }
  .line.cta { color: #f5a623; font-size: clamp(22px, 4.2vw, 38px); }

  /* Colored background flash */
  #bg-flash {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none;
  }

  #logo {
    position: absolute; bottom: 4%; width: 100%; text-align: center;
    font-family: Arial, sans-serif; font-size: clamp(14px,2.5vw,22px);
    color: #ccc; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.5s;
  }
  #progress {
    position: absolute; bottom: 0; left: 0; height: 5px;
    background: #f5a623; width: 0%;
  }
  #overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer; z-index: 10;
  }
  #overlay .play-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: #f5a623; display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin-bottom: 16px;
  }
  #overlay p { color: #fff; font-family: Arial, sans-serif; font-size: 16px; }
  #overlay small { color: #aaa; font-family: Arial, sans-serif; font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<div id="canvas">
  <div id="overlay" onclick="startAnimation()">
    <div class="play-icon">▶</div>
    <p>C03-B — "Você já tentou de tudo"</p>
    <small>Clique para iniciar · Grave a tela em 9:16 · ~32s</small>
  </div>
  <div id="bg-flash"></div>
  <div id="text-display"></div>
  <div id="logo">🐾 DogFlow</div>
  <div id="progress" id="progress"></div>
</div>

<script>
const TOTAL = 33000;

const SLIDES = [
  { at: 0,     hold: 2500, text: 'Você já tentou de tudo', cls: 'med' },
  { at: 800,   hold: 2500, text: 'pro cachorro parar', cls: 'big' },
  { at: 1600,  hold: 2500, text: 'de fazer xixi', cls: 'big accent' },

  { at: 3800,  hold: 1800, text: 'Tapete higiênico em 5 lugares ❌', cls: 'small red-txt' },
  { at: 5700,  hold: 1800, text: 'Spray antiprogramas ❌', cls: 'small red-txt' },
  { at: 7600,  hold: 1800, text: 'Gritar "NÃO" toda vez ❌', cls: 'small red-txt' },
  { at: 9500,  hold: 1800, text: 'Jornal no chão ❌', cls: 'small red-txt' },

  { at: 11700, hold: 2500, text: 'Nada funcionou.', cls: 'big', bg: null },
  { at: 14500, hold: 2800, text: 'Porque nenhum desses', cls: 'small' },
  { at: 15500, hold: 2800, text: 'ensina ONDE é o lugar certo.', cls: 'med accent' },

  // BG muda para amarelo
  { at: 18500, hold: 2800, text: 'O DogFlow faz isso.', cls: 'big green-txt', bgColor: '#fff9ed' },
  { at: 20500, hold: 2500, text: '7 dias. 10 min por dia.', cls: 'med' },

  { at: 23300, hold: 1600, text: 'Dia 1: marca o território certo', cls: 'small muted' },
  { at: 25000, hold: 1600, text: 'Dia 3: primeiros resultados', cls: 'small muted' },
  { at: 26700, hold: 1800, text: 'Dia 7: hábito instalado', cls: 'small green-txt' },

  { at: 29000, hold: 2200, text: '👇 Começa hoje por R$27', cls: 'cta' },
  { at: 30500, hold: 2000, text: 'Clica em Saiba Mais', cls: 'muted' },
];

function startAnimation() {
  document.getElementById('overlay').style.display = 'none';
  const display = document.getElementById('text-display');
  const logo = document.getElementById('logo');
  const bgFlash = document.getElementById('bg-flash');
  const progress = document.getElementById('progress');

  progress.style.transition = `width ${TOTAL}ms linear`;
  setTimeout(() => { progress.style.width = '100%'; }, 50);
  setTimeout(() => { logo.style.opacity = '1'; }, 28000);

  let currentEls = [];

  SLIDES.forEach(slide => {
    setTimeout(() => {
      currentEls.forEach(el => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 350);
      });
      currentEls = [];

      if (slide.bgColor) {
        document.querySelector('#canvas').style.background = slide.bgColor;
      }

      const el = document.createElement('span');
      el.className = 'line ' + slide.cls;
      el.textContent = slide.text;
      display.appendChild(el);
      currentEls.push(el);
      setTimeout(() => el.classList.add('show'), 30);

      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => { if (el.parentNode) el.remove(); }, 350);
      }, slide.hold);
    }, slide.at);
  });
}
</script>
</body>
</html>
